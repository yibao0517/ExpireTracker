<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no">
<title>还有这些没吃呢</title>

<style>
body{
    margin:0;
    font-family:-apple-system;
    background:#f2f2f7;
}

/* 顶部栏 */
.top-bar{
    display:flex;
    justify-content:space-between;
    align-items:center;
    padding:20px;
    background:white;
    font-size:20px;
    font-weight:bold;
}

.fab{
    position:fixed;
    right:25px;
    bottom:30px;
    width:70px;
    height:70px;
    border-radius:50%;

    /* iOS 毛玻璃效果 */
    backdrop-filter: blur(20px);
    -webkit-backdrop-filter: blur(20px);
    background: rgba(255,255,255,0.6);

    display:flex;
    align-items:center;
    justify-content:center;

    font-size:38px;
    font-weight:300;
    color:#007aff;

    box-shadow:
        0 10px 30px rgba(0,0,0,0.15),
        inset 0 1px 1px rgba(255,255,255,0.6);

    z-index:1000;
    transition:all 0.2s ease;
}

/* 按下效果 */
.fab:active{
    transform:scale(0.92);
    box-shadow:
        0 6px 15px rgba(0,0,0,0.2);
}

/* 列表 */
#list{
    padding:15px;
    padding-bottom:130px;
}
.swipe-container{
    position:relative;
    overflow:hidden;
    margin-bottom:12px;
    border-radius:16px;
}

.delete-btn{
    position:absolute;
    right:0;
    top:0;
    bottom:0;
    width:90px;
    background:#ff3b30;
    color:white;
    display:flex;
    align-items:center;
    justify-content:center;
    font-weight:bold;
    z-index:1;
}

.card{
    padding:15px;
    border-radius:16px;
    transition:transform 0.25s ease;
    position:relative;
    z-index:2;
}

/* 颜色 */
.e-expired{
    background:#e0e0e0;
    color:#888;
}

.e-urgent{ background:#ffe5e5; }
.e-warning{ background:#fff4cc; }
.e-safe{ background:#e8f9ec; }

.days{
    font-size:18px;
    font-weight:bold;
    margin-top:5px;
}

/* 弹窗 */
.modal{
    position:fixed;
    top:0;
    left:0;
    right:0;
    bottom:0;

    /* 半透明遮罩 */
    background: rgba(0,0,0,0.25);
    backdrop-filter: blur(10px);
    -webkit-backdrop-filter: blur(10px);

    display:none;
    z-index:999;

    display:none;
    justify-content:center;
    align-items:flex-end; /* 贴近下半部分 */
}

.modal-content{
    width:100%;
    max-width:500px;
    background:white;
    border-top-left-radius:25px;
    border-top-right-radius:25px;
    padding:30px 25px 40px 25px;

    box-shadow:0 -10px 30px rgba(0,0,0,0.15);
}

.form-row{
    display:flex;
    gap:10px;
}
.calendar-wrapper{
    width:45px;
    height:45px;
    border-radius:12px;
    background:#f2f2f7;
    display:flex;
    align-items:center;
    justify-content:center;
    font-size:20px;
    position:relative;
}

.calendar-wrapper input{
    position:absolute;
    width:100%;
    height:100%;
    opacity:0;
}
.form-row input[type="text"]{
    flex:2;
}

.form-row input[type="date"]{
    flex:1;
}

input{
    padding:10px;
    border-radius:10px;
    border:1px solid #ddd;
    font-size:16px;
}

.save-btn{
    margin-top:25px;
    width:100%;
    padding:16px;
    border:none;
    border-radius:14px;
    background:#007aff;
    color:white;
    font-size:18px;
}

.close-btn{
    position:absolute;
    top:25px;
    right:25px;
    font-size:28px;
    font-weight:bold;
    color:#333;
}
</style>

</head>

<body>

<header class="top-bar">
    <div>还这些没吃呢</div>
</header>

<div class="fab" onclick="openModal()">＋</div>

<div id="list"></div>

<div class="modal" id="modal">
    

    <div class="modal-content">
        <h2>又得到什么好吃的啦！</h2>

        <div class="form-row">
            <input id="name" type="text" placeholder="名称">

            <div class="calendar-wrapper">
                <input id="expireDate" type="date">
                📅
            </div>
        </div>

        <button class="save-btn" onclick="addItem()">Get！</button>
    </div>
</div>

<script>

let items = JSON.parse(localStorage.getItem("items") || "[]");
let activeCard = null;

function save(){
    localStorage.setItem("items", JSON.stringify(items));
}

function daysLeft(dateStr){
    const today = new Date();
    const target = new Date(dateStr);
    today.setHours(0,0,0,0);
    target.setHours(0,0,0,0);
    return Math.ceil((target - today)/(1000*60*60*24));
}

function render(){
    const list=document.getElementById("list");
    list.innerHTML="";

    items.sort((a,b)=> new Date(a.expireDate)-new Date(b.expireDate));

    items.forEach(item=>{
        const days = daysLeft(item.expireDate);

        const container=document.createElement("div");
        container.className="swipe-container";

        const btn=document.createElement("div");
        btn.className="delete-btn";
        btn.innerText="已吃";
        btn.onclick=(e)=>{
            e.stopPropagation();
            if(confirm("确定吃掉啦？")){
                items=items.filter(i=>i.id!==item.id);
                save();
                render();
            }
        };

        const card=document.createElement("div");
        card.className="card";

        if(days < 0){
            card.classList.add("e-expired");
        }
        else if(days <= 3){
            card.classList.add("e-urgent");
        }
        else if(days <= 7){
            card.classList.add("e-warning");
        }
        else{
            card.classList.add("e-safe");
        }

        card.innerHTML=`
            <div style="font-weight:bold;font-size:18px;">${item.name}</div>
            <div>到期：${item.expireDate}</div>
            <div class="days">
                ${days<0 ? "已过期 "+Math.abs(days)+" 天" : "还有 "+days+" 天"}
            </div>
        `;

        let startX=0;
        let currentX=0;

        card.addEventListener("touchstart",e=>{
            startX=e.touches[0].clientX;

            if(activeCard && activeCard!==card){
                activeCard.style.transform="translateX(0)";
            }
        });

        card.addEventListener("touchmove",e=>{
            currentX=e.touches[0].clientX;
            let diff=currentX-startX;

            if(diff<0 && diff>-90){
                card.style.transform=`translateX(${diff}px)`;
            }
        });

        card.addEventListener("touchend",()=>{
            let diff=currentX-startX;

            if(diff<-50){
                card.style.transform="translateX(-90px)";
                activeCard=card;
            }else{
                card.style.transform="translateX(0)";
                activeCard=null;
            }
        });

        container.appendChild(btn);
        container.appendChild(card);
        list.appendChild(container);
    });
}

function addItem(){
    const name=document.getElementById("name").value;
    const date=document.getElementById("expireDate").value;

    if(!name||!date) return;

    items.push({
        id:Date.now(),
        name:name,
        expireDate:date
    });

    save();
    render();

    document.getElementById("name").value="";
    document.getElementById("expireDate").value="";
    closeModal();
}

function openModal(){
    const modal = document.getElementById("modal");
    modal.style.display = "flex";
    document.querySelector(".fab").style.display = "none";
}

function closeModal(){
    const modal = document.getElementById("modal");
    modal.style.display = "none";
    document.querySelector(".fab").style.display = "flex";
}
let startY = 0;

const modal = document.getElementById("modal");
const modalContent = document.querySelector(".modal-content");

modalContent.addEventListener("touchstart", function(e){
    startY = e.touches[0].clientY;
});

modalContent.addEventListener("touchmove", function(e){
    let currentY = e.touches[0].clientY;
    let diff = currentY - startY;

    if(diff > 0){
        modalContent.style.transform = `translateY(${diff}px)`;
    }
});

modalContent.addEventListener("touchend", function(e){
    let endY = e.changedTouches[0].clientY;
    let diff = endY - startY;

    if(diff > 100){
        closeModal();
        modalContent.style.transform = "translateY(0)";
    }else{
        modalContent.style.transform = "translateY(0)";
    }
});
render();

</script>

</body>
</html>
