<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
<title>还这些没吃呢</title>
<style>
:root {
    --bg: #F2F2F7;
    --card-bg: #FFFFFF;
    --primary: #007AFF;
    --danger: #FF3B30;
    --text: #000000;
    --gray: #8E8E93;
}

* { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }

body {
    margin: 0;
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
    background: var(--bg);
    color: var(--text);
    height: 100dvh; 
    overflow: hidden;
    display: flex;
    flex-direction: column;
}

header {
    padding: 20px;
    text-align: center;
    font-size: 20px;
    font-weight: 700;
    background: rgba(255,255,255,0.8);
    backdrop-filter: blur(10px);
    z-index: 10;
    flex-shrink: 0;
}

#list-container {
    flex: 1;
    overflow-y: auto;
    padding: 15px;
    padding-bottom: 100px;
    -webkit-overflow-scrolling: touch;
}

.swipe-item {
    position: relative;
    margin-bottom: 12px;
    /* 只有这里保留圆角 */
    border-radius: 16px; 
    /* 关键：强制硬件加速裁剪，消除抗锯齿缝隙 */
    overflow: hidden; 
    transform: translateZ(0); /* 开启 GPU 加速，修复渲染瑕疵 */
    background: var(--bg); /* 确保缝隙即使露出来也是背景色 */
}

.delete-action {
    position: absolute;
    right: 0;
    top: 0;
    bottom: 0;
    width: 60px; /* 你的自定义宽度 */
    background: var(--danger);
    color: white;
    display: flex;
    align-items: center;
    justify-content: center;
    font-weight: 600;
    z-index: 1;
    /* 【关键修改】去掉圆角，或者设大一点 */
    border-radius: 0; 
}
.card {
    position: relative;
    background: var(--card-bg);
    padding: 16px;
    /* 【关键修改】去掉圆角！让父容器去裁剪它 */
    border-radius: 0; 
    /* 或者为了保险，设一个比父容器大很多的圆角，防止直角露出来，但通常 0 最好 */
    /* border-radius: 20px;  <-- 如果 0 不行，试这个，但要大于父容器的 16px */
    
    display: flex;
    justify-content: space-between;
    align-items: center;
    z-index: 2;
    transition: transform 0.3s cubic-bezier(0.25, 0.8, 0.25, 1);
    height: 70px;
    box-shadow: 0 2px 8px rgba(0,0,0,0.04);
    
}

.card-info { flex: 1; }
.card-title { font-size: 17px; font-weight: 600; margin-bottom: 4px; }
.card-date { font-size: 13px; color: var(--gray); }

.badge {
    font-size: 58px;
    font-weight: 700;
    height: 90%;
    line-height: 1;
    min-width: 60px;
    display: flex;
    align-items: center;
    justify-content: center;
    margin-left: 12px;
    background: transparent !important;
    border-radius: 0;
}
.badge-expired { color: #8E8E93; }
.badge-urgent { color: #FF3B30; }
.badge-warning { color: #FF9500; }
.badge-safe { color: #34C759; }

.status-expired { background: #f2f2f7; }
.status-urgent { background: #ffe5e5; }
.status-warning { background: #fff4cc; }
.status-safe { background: #e8f9ec; }

.fab {
    position: fixed;
    right: 25px;
    bottom: 30px;
    width: 60px;
    height: 60px;
    border-radius: 50%;
    background: rgba(255,255,255,0.9);
    backdrop-filter: blur(10px);
    color: var(--primary);
    font-size: 36px;
    display: flex;
    align-items: center;
    justify-content: center;
    box-shadow: 0 4px 15px rgba(0,0,0,0.15);
    z-index: 90;
    border: none;
    cursor: pointer;
}
.fab:active { transform: scale(0.95); }

.modal-overlay {
    position: fixed;
    inset: 0;
    background: rgba(0,0,0,0.4);
    backdrop-filter: blur(5px);
    z-index: 1000;
    display: none;
    opacity: 0;
    transition: opacity 0.3s;
}
.modal-overlay.active { display: flex; opacity: 1; }

.modal-panel {
    position: fixed;
    left: 0;
    right: 0;
    bottom: 0;
    background: var(--card-bg);
    border-radius: 22px 22px 0 0;
    padding: 24px 20px 40px;
    z-index: 1001;
    transform: translateY(100%);
    transition: transform 0.3s cubic-bezier(0.25, 0.8, 0.25, 1);
    max-height: 90vh;
    display: flex;
    flex-direction: column;
    overflow-y: auto; 
    -webkit-overflow-scrolling: touch;
}
.modal-panel.active { transform: translateY(0); }

.modal-handle {
    width: 40px;
    height: 5px;
    background: #d1d1d6;
    border-radius: 3px;
    margin: 0 auto 20px;
    flex-shrink: 0;
}

.modal-title {
    text-align: center;
    font-size: 18px;
    font-weight: 600;
    margin-bottom: 24px;
    flex-shrink: 0;
}

.input-row {
    display: flex;
    gap: 12px;
    background: #F2F2F7;
    padding: 6px;
    border-radius: 14px;
    margin-bottom: 24px;
    align-items: center;
    flex-shrink: 0;
}

.input-row input[type="text"] {
    flex: 1;
    border: none;
    background: transparent;
    padding: 12px;
    font-size: 16px;
    outline: none;
    color: var(--text);
}

.calendar-btn {
    width: 48px;
    height: 44px;
    background: white;
    border-radius: 10px;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 22px;
    position: relative;
    box-shadow: 0 2px 5px rgba(0,0,0,0.05);
    flex-shrink: 0;
}
.calendar-btn input[type="date"] {
    position: absolute;
    inset: 0;
    opacity: 0;
    width: 100%;
    height: 100%;
    cursor: pointer;
}

.save-btn {
    width: 100%;
    padding: 16px;
    background: var(--primary);
    color: white;
    border: none;
    border-radius: 14px;
    font-size: 17px;
    font-weight: 600;
    cursor: pointer;
    flex-shrink: 0;
}
.save-btn:active { opacity: 0.8; }

.empty-state {
    text-align: center;
    color: var(--gray);
    margin-top: 60px;
    font-size: 15px;
}
</style>
</head>
<body>

<header>还这些没吃呢</header>

<div id="list-container">
    <div id="food-list"></div>
    <div id="empty-state" class="empty-state" style="display:none;">
        暂无记录<br>
    </div>
</div>

<button class="fab" onclick="openModal()">+</button>

<!-- 弹窗 -->
<div class="modal-overlay" id="modal-overlay" onclick="handleOverlayClick(event)"></div>
<div class="modal-panel" id="modal-panel">
    <div class="modal-handle"></div>
    <div class="modal-title">又得到什么好吃的啦？</div>
    
    <div class="input-row" style="flex-direction: column; gap: 12px;">
  <!-- 名称输入 -->
  <div style="display: flex; gap: 12px; width: 100%;">
    <input type="text" id="input-name" placeholder="放这里！" autocomplete="off" style="flex: 1;">
    <!-- 切换按钮 -->
    <button type="button" class="calendar-btn" style="width: auto; padding: 0 12px; font-size: 14px; background: white;" onclick="toggleInputMode()">
      <span id="mode-text">算天数</span>
    </button>
  </div>

  <!-- 模式 1: 选择日期 (默认隐藏) -->
  <div id="date-mode" style="display: none; width: 100%; justify-content: flex-end;">
    <div class="calendar-btn" style="width: 100%;">
      📅 
      <input type="date" id="input-date" style="width: 100%;">
    </div>
  </div>

  <!-- 模式 2: 输入天数 (默认显示) -->
  <div id="days-mode" style="display: flex; gap: 12px; width: 100%;">
    <input type="number" id="input-days" placeholder="保质期几天？" min="1" style="flex: 1; padding: 12px; border-radius: 10px; border: 1px solid #E5E5EA;">
    <button type="button" class="save-btn" style="width: auto; padding: 0 20px; font-size: 15px;" onclick="calculateDate()">
      计算
    </button>
  </div>
</div>

    <button class="save-btn" onclick="saveItem()">GET!</button>
</div>

<script>
// --- 唯一的数据与逻辑核心 ---
let items = JSON.parse(localStorage.getItem('foods') || '[]');
let panelStartY = 0; // 用于下拉关闭

function render() {
    const list = document.getElementById('food-list');
    const empty = document.getElementById('empty-state');
    list.innerHTML = '';

    if (items.length === 0) {
        empty.style.display = 'block';
        return;
    }
    empty.style.display = 'none';

    items.sort((a, b) => new Date(a.date) - new Date(b.date));

    items.forEach(item => {
        const days = getDays(item.date);
        let statusClass = 'status-safe', badgeClass = 'badge-safe', text = `${days}`;
        
        if (days < 0) { 
            statusClass = 'status-expired'; 
            badgeClass = 'badge-expired'; 
            text = `坏掉啦!`; 
        } else if (days <= 3) { 
            statusClass = 'status-urgent'; 
            badgeClass = 'badge-urgent'; 
            text = days===0 ? '今天' : `${days}`; 
        } else if (days <= 7) { 
            statusClass = 'status-warning'; 
            badgeClass = 'badge-warning'; 
        }

        const wrapper = document.createElement('div');
        wrapper.className = 'swipe-item';
        wrapper.innerHTML = `
            <div class="delete-action" onclick="confirmDelete(${item.id})">已吃</div>
            <div class="card ${statusClass}" id="card-${item.id}">
                <div class="card-info">
                    <div class="card-title">${item.name}</div>
                    <div class="card-date">${item.date}</div>
                </div>
                <div class="badge ${badgeClass}">${text}</div>
            </div>
        `;
        list.appendChild(wrapper);
        initSwipe(wrapper.querySelector('.card'));
    });
}

function getDays(dateStr) {
    const today = new Date(); today.setHours(0,0,0,0);
    const target = new Date(dateStr); target.setHours(0,0,0,0);
    return Math.ceil((target - today) / (1000*60*60*24));
}

function saveData() {
    localStorage.setItem('foods', JSON.stringify(items));
    render();
}

// 滑动删除逻辑
function initSwipe(card) {
    let startX, currentX, isSwiping = false;
    
    card.addEventListener('touchstart', e => {
        document.querySelectorAll('.card').forEach(c => {
            if(c !== card) c.style.transform = 'translateX(0)';
        });
        startX = e.touches[0].clientX;
        isSwiping = true;
        card.style.transition = 'none';
    }, {passive: true});

    card.addEventListener('touchmove', e => {
        if(!isSwiping) return;
        currentX = e.touches[0].clientX;
        const diff = currentX - startX;
        if(diff < 0 && diff > -80) {
            card.style.transform = `translateX(${diff}px)`;
        }
    }, {passive: true});

    card.addEventListener('touchend', () => {
        if(!isSwiping) return;
        isSwiping = false;
        const diff = currentX - startX;
        card.style.transition = 'transform 0.3s cubic-bezier(0.25, 0.8, 0.25, 1)';
        if(diff < -40) {
            card.style.transform = 'translateX(-80px)';
        } else {
            card.style.transform = 'translateX(0)';
        }
    });
    
    card.addEventListener('click', () => {
        if(card.style.transform && card.style.transform.includes('-80')) {
            card.style.transform = 'translateX(0)';
        }
    });
}

function confirmDelete(id) {
    if(confirm('确定已经吃完了吗？')) {
        items = items.filter(i => i.id !== id);
        saveData();
    } else {
        const card = document.getElementById(`card-${id}`);
        if(card) card.style.transform = 'translateX(0)';
    }
}

// 弹窗控制
const modalOverlay = document.getElementById('modal-overlay');
const modalPanel = document.getElementById('modal-panel');
const inputName = document.getElementById('input-name');
const inputDate = document.getElementById('input-date');

function openModal() {
    modalOverlay.classList.add('active');
    setTimeout(() => {
        modalPanel.classList.add('active');
        inputName.focus();
        scrollToInput();
    }, 100);
}

function closeModal() {
    modalPanel.classList.remove('active');
    setTimeout(() => {
        modalOverlay.classList.remove('active');
        inputName.blur();
        inputDate.blur();
        inputName.value = '';
        inputDate.value = '';
        modalPanel.style.transform = ''; 
    }, 300);
}

function handleOverlayClick(e) {
    if(e.target === modalOverlay) closeModal();
}

function scrollToInput() {
    setTimeout(() => {
        inputName.scrollIntoView({ behavior: 'smooth', block: 'center' });
    }, 300);
    setTimeout(() => {
        inputName.scrollIntoView({ behavior: 'auto', block: 'center' });
    }, 600);
}

inputName.addEventListener('focus', scrollToInput);
inputDate.addEventListener('focus', scrollToInput);

function saveItem() {
    const name = inputName.value.trim();
    const date = inputDate.value;
    
    if(!name || !date) {
        alert('请填写名称并选择日期');
        return;
    }
    
    items.push({ id: Date.now(), name, date });
    saveData();
    closeModal();
}

// 下拉关闭手势 (唯一绑定)
modalPanel.addEventListener('touchstart', e => {
    panelStartY = e.touches[0].clientY;
    modalPanel.style.transition = 'none';
}, {passive: true});

modalPanel.addEventListener('touchmove', e => {
    const y = e.touches[0].clientY;
    const diff = y - panelStartY;
    if(diff > 0) {
        modalPanel.style.transform = `translateY(${diff}px)`;
    }
}, {passive: true});

modalPanel.addEventListener('touchend', e => {
    const y = e.changedTouches[0].clientY;
    const diff = y - panelStartY;
    
    modalPanel.style.transition = 'transform 0.3s cubic-bezier(0.25, 0.8, 0.25, 1)';
    
    if(diff > 100) {
        closeModal();
    } else {
        modalPanel.style.transform = 'translateY(0)';
    }
});

// 初始化
render();
document.getElementById('input-date').min = new Date().toISOString().split('T')[0];
// --- 新增功能：保质期天数计算与切换逻辑 ---

// 页面加载时初始化
window.onload = function() {
  // 初始化日期为今天（防止用户直接点保存而没选日期）
  document.getElementById('input-date').valueAsDate = new Date();
}

// 切换输入模式
function toggleInputMode() {
  const dateMode = document.getElementById('date-mode');
  const daysMode = document.getElementById('days-mode');
  const modeText = document.getElementById('mode-text');
  
  if (dateMode.style.display === 'none') {
    // 切换到 选择日期 模式
    dateMode.style.display = 'flex';
    daysMode.style.display = 'none';
    modeText.textContent = '选日期';
  } else {
    // 切换到 算天数 模式
    dateMode.style.display = 'none';
    daysMode.style.display = 'flex';
    modeText.textContent = '算天数';
  }
}

// 计算过期日期
function calculateDate() {
  const name = document.getElementById('input-name').value.trim();
  const daysInput = document.getElementById('input-days').value;
  
  if (!name) {
    alert('请先填写食物名称');
    return;
  }
  
  if (!daysInput || daysInput <= 0) {
    alert('请输入有效的天数');
    return;
  }

  // 获取今天的日期
  const today = new Date();
  // 计算过期日 = 今天 + 天数
  const expireDate = new Date(today);
  expireDate.setDate(today.getDate() + parseInt(daysInput));

  // 格式化日期为 YYYY-MM-DD (HTML date input 需要的格式)
  const yyyy = expireDate.getFullYear();
  let mm = expireDate.getMonth() + 1;
  let dd = expireDate.getDate();
  if (dd < 10) dd = '0' + dd;
  if (mm < 10) mm = '0' + mm;
  const formattedDate = yyyy + '-' + mm + '-' + dd;

  // 填入日期框并切换模式
  document.getElementById('input-date').value = formattedDate;
  // 自动切换到日期模式以便用户确认
  document.getElementById('date-mode').style.display = 'flex';
  document.getElementById('days-mode').style.display = 'none';
  document.getElementById('mode-text').textContent = '选日期';
  
  alert(`保质期 ${daysInput} 天，将在 ${formattedDate} 过期`);
}

// 修改后的保存函数 (需要覆盖原函数)
function saveItem() {
  const name = document.getElementById('input-name').value.trim();
  const date = document.getElementById('input-date').value;
  
  if(!name || !date) {
    alert('请填写名称并确定日期');
    return;
  }
  
  items.push({ id: Date.now(), name, date });
  saveData(); // saveData 会自动调用 render()
  closeModal();
}
</script>
</body>
</html>
