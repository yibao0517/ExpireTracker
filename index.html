<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no, viewport-fit=cover">
<title>还有这些没吃呢</title>
<style>
/* ... (前面的 CSS 保持不变) ... */
body{
    margin:0;
    font-family:-apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
    background:#f2f2f7;
    -webkit-tap-highlight-color: transparent;
    /* 防止整体页面被键盘挤压变形 */
    height: 100vh; 
    overflow: hidden; 
}
/* ... (中间 CSS 保持不变) ... */

/* 弹窗优化 */
.modal{
    position:fixed;
    top:0;
    left:0;
    right:0;
    bottom:0;
    background: rgba(0,0,0,0.3);
    backdrop-filter: blur(5px);
    -webkit-backdrop-filter: blur(5px);
    display:none;
    z-index:2000;
    justify-content:center;
    align-items:flex-end;
    /* 关键：确保遮罩层占满整个屏幕，即使键盘弹出 */
    height: 100vh; 
    width: 100vw;
}
.modal.active {
    display: flex;
}
.modal-content{
    width:100%;
    max-width:600px;
    background:white;
    border-top-left-radius:22px;
    border-top-right-radius:22px;
    padding:24px 20px 30px 20px;
    box-shadow:0 -5px 25px rgba(0,0,0,0.1);
    /* 初始状态 */
    transform: translateY(100%); 
    transition: transform 0.3s cubic-bezier(0.25, 0.8, 0.25, 1);
    /* 关键：允许内容滚动，防止内部溢出 */
    max-height: 90vh; 
    overflow-y: auto;
    -webkit-overflow-scrolling: touch;
}

/* 解决 iOS 键盘遮挡的核心类 */
.modal-content.keyboard-open {
    /* 当键盘打开时，通过 JS 动态调整这个值，或者使用 translate */
    /* 这里我们主要靠 JS 动态控制 transform */
    transition: none; /* 移除动画以保证跟手性 */
}

/* ... (后续 CSS 保持不变) ... */
.form-row{
    display:flex;
    gap:12px;
    align-items: center;
    background: #f2f2f7;
    padding: 6px;
    border-radius: 14px;
    margin-bottom: 20px;
}
.form-row input[type="text"]{
    flex: 1;
    border: none;
    background: transparent;
    padding: 12px;
    font-size: 16px; /* 防止 iOS 自动缩放 */
    outline: none;
    color: #000;
}
/* ... (其余 CSS 不变) ... */
</style>
</head>
<body>

<!-- ... (HTML 结构不变) ... -->
<header class="top-bar">
    <div>还这些没吃呢</div>
</header>

<div class="fab" onclick="openModal()">＋</div>

<div id="list"></div>

<!-- 弹窗结构 -->
<div class="modal" id="modal">
    <div class="close-area" onclick="closeModal()" style="position:absolute; top:0; left:0; right:0; bottom:0; z-index:-1;"></div>
    <div class="modal-content" id="modalContent">
        <div class="modal-handle"></div>
        <h2>新添了什么美味？</h2>
        
        <div class="form-row">
            <input id="name" type="text" placeholder="食物名称 (如: 牛奶)" autocomplete="off">
            <div class="calendar-wrapper">
                <span>📅</span>
                <input id="expireDate" type="date">
            </div>
        </div>

        <button class="save-btn" onclick="addItem()">确认添加</button>
    </div>
</div>

<script>
// ... (数据逻辑不变) ...
let items = JSON.parse(localStorage.getItem("items") || "[]");
let activeCard = null;
// 记录原始视口高度
let visualViewportHeight = window.innerHeight;

function save(){
    localStorage.setItem("items", JSON.stringify(items));
}

// ... (daysLeft, render 函数不变) ...
function daysLeft(dateStr){
    const today = new Date();
    const target = new Date(dateStr);
    today.setHours(0,0,0,0);
    target.setHours(0,0,0,0);
    return Math.ceil((target - today)/(1000*60*60*24));
}

function render(){
    // ... (render 函数内容完全不变，为节省篇幅省略，请使用之前的版本) ...
    const list=document.getElementById("list");
    list.innerHTML="";
    if(items.length === 0) {
        list.innerHTML = '<div style="text-align:center; color:#8e8e93; margin-top:50px; font-size:15px;">暂无记录<br>点击右上角 + 添加</div>';
        return;
    }
    items.sort((a,b)=> new Date(a.expireDate)-new Date(b.expireDate));
    items.forEach(item=>{
        const days = daysLeft(item.expireDate);
        const container=document.createElement("div");
        container.className="swipe-container";
        const btn=document.createElement("div");
        btn.className="delete-btn";
        btn.innerText="已吃";
        btn.onclick=(e)=>{
            e.stopPropagation();
            if(confirm(`确定"${item.name}"已经吃完了吗？`)){
                items=items.filter(i=>i.id!==item.id);
                save();
                render();
            }
        };
        const card=document.createElement("div");
        card.className="card";
        let statusClass = "e-safe";
        let badgeClass = "badge-safe";
        if(days < 0){ statusClass = "e-expired"; badgeClass = "badge-expired"; } 
        else if(days <= 3){ statusClass = "e-urgent"; badgeClass = "badge-urgent"; } 
        else if(days <= 7){ statusClass = "e-warning"; badgeClass = "badge-warning"; }
        card.classList.add(statusClass);
        const daysText = days < 0 ? `过期${Math.abs(days)}天` : (days === 0 ? '今天' : `剩${days}天`);
        card.innerHTML=`
            <div class="card-left">
                <div class="card-title">${item.name}</div>
                <div class="card-date">${item.expireDate}</div>
            </div>
            <div class="day-badge ${badgeClass}">
                ${daysText}
            </div>
        `;
        // 滑动逻辑省略... (保持原样)
        let startX=0, currentX=0, isSwiping = false;
        card.addEventListener("touchstart",e=>{
            if(activeCard && activeCard!==card){ activeCard.style.transform="translateX(0)"; activeCard = null; }
            startX=e.touches[0].clientX; isSwiping = true; card.style.transition = "none";
        }, {passive: true});
        card.addEventListener("touchmove",e=>{
            if(!isSwiping) return;
            currentX=e.touches[0].clientX;
            let diff=currentX-startX;
            if(diff<0 && diff>-90){ card.style.transform=`translateX(${diff}px)`; }
        }, {passive: true});
        card.addEventListener("touchend",()=>{
            if(!isSwiping) return;
            isSwiping = false;
            let diff=currentX-startX;
            card.style.transition="transform 0.3s cubic-bezier(0.25, 0.8, 0.25, 1)";
            if(diff<-50){ card.style.transform="translateX(-80px)"; activeCard=card; } 
            else { card.style.transform="translateX(0)"; activeCard=null; }
        });
        container.appendChild(btn);
        container.appendChild(card);
        list.appendChild(container);
    });
}

function addItem(){
    const name=document.getElementById("name").value.trim();
    const date=document.getElementById("expireDate").value;
    if(!name || !date){ alert("请填写名称并选择日期哦！"); return; }
    items.push({ id:Date.now(), name:name, expireDate:date });
    save();
    render();
    document.getElementById("name").value="";
    document.getElementById("expireDate").value="";
    closeModal();
}

// --- 核心修改：处理键盘弹出逻辑 ---

const modal = document.getElementById("modal");
const modalContent = document.getElementById("modalContent");
const nameInput = document.getElementById("name");
const dateInput = document.getElementById("expireDate");

function openModal(){
    modal.classList.add("active");
    // 重置 transform，确保从底部滑入
    modalContent.style.transform = "translateY(0)"; 
    document.querySelector(".fab").style.display = "none";
    
    setTimeout(() => {
        nameInput.focus();
    }, 300);
}

function closeModal(){
    modal.classList.remove("active");
    document.querySelector(".fab").style.display = "flex";
    nameInput.blur();
    dateInput.blur();
    // 恢复样式
    modalContent.style.transform = ""; 
    modalContent.classList.remove("keyboard-open");
}

// 监听视觉视口变化 (Visual Viewport API) - 最现代且有效的方法
if (window.visualViewport) {
    window.visualViewport.addEventListener('resize', () => {
        if (!modal.classList.contains('active')) return;

        const keyboardHeight = window.innerHeight - window.visualViewport.height;
        
        // 如果键盘高度大于 100px，认为键盘已打开
        if (keyboardHeight > 100) {
            modalContent.classList.add("keyboard-open");
            // 将弹窗向上平移键盘的高度，留出一点空隙 (例如 20px)
            // 注意：这里使用 translateY 负值来向上推
            modalContent.style.transform = `translateY(-${keyboardHeight - 20}px)`;
            
            // 确保输入框在可视区域内 (可选，作为双重保险)
            // nameInput.scrollIntoView({block: "center"}); 
        } else {
            // 键盘关闭，恢复原位
            modalContent.classList.remove("keyboard-open");
            modalContent.style.transform = "translateY(0)";
        }
    });
}

// 兼容处理：针对部分不支持 visualViewport 的老设备，使用 focus/blur 监听
nameInput.addEventListener('focus', function() {
    if (!window.visualViewport) {
        // 简单策略：给 body 或 modal 一个类，通过 CSS media query 或 JS 计算调整
        // 这里采用直接延时检查高度的方法
        setTimeout(() => {
             const heightDiff = window.innerHeight - (document.documentElement.clientHeight || document.body.clientHeight);
             if(heightDiff > 100) {
                 modalContent.style.transform = `translateY(-${heightDiff}px)`;
             }
        }, 300);
    }
});

nameInput.addEventListener('blur', function() {
    if (!window.visualViewport) {
        modalContent.style.transform = "translateY(0)";
    }
});

// 下拉关闭逻辑 (保持原有，但增加对 transform 的复位保护)
let startY = 0;
let currentY = 0;
let isKeyboardOpen = false;

modalContent.addEventListener("touchstart", function(e){
    startY = e.touches[0].clientY;
    // 如果键盘开着，先不处理下拉，或者先收起键盘
    if (document.activeElement === nameInput || document.activeElement === dateInput) {
        // 可选：在这里调用 blur() 收起键盘再下拉，体验更佳
        // document.activeElement.blur(); 
        // return; 
    }
    this.style.transition = "none";
}, {passive: true});

modalContent.addEventListener("touchmove", function(e){
    currentY = e.touches[0].clientY;
    let diff = currentY - startY;
    // 只有在键盘未遮挡或已处理偏移时才允许下拉
    if(diff > 0){
        // 如果当前有 translateY 偏移（因为键盘），需要在此基础上累加
        const currentTransform = this.style.transform;
        // 简单处理：如果键盘开着，下拉逻辑可能会冲突，建议键盘开启时禁止下拉关闭，或者先收起键盘
        // 这里为了简单，如果检测到键盘高度，暂时禁止下拉关闭，避免计算复杂
        if (modalContent.classList.contains("keyboard-open")) {
           // 可以选择禁用下拉，或者让用户先点空白处收起键盘
           return; 
        }
        this.style.transform = `translateY(${diff}px)`;
    }
}, {passive: true});

modalContent.addEventListener("touchend", function(){
    if (modalContent.classList.contains("keyboard-open")) {
        // 键盘开启时，重置位置但不关闭，除非用户明确点击遮罩
        this.style.transition = "transform 0.3s cubic-bezier(0.25, 0.8, 0.25, 1)";
        this.style.transform = ""; // 恢复到键盘撑起的状态 (由 resize 事件接管)
        return;
    }

    let diff = currentY - startY;
    this.style.transition = "transform 0.3s cubic-bezier(0.25, 0.8, 0.25, 1)";
    if(diff > 100){
        closeModal();
    } else {
        this.style.transform = "translateY(0)";
    }
});

// 初始化
render();
</script>
</body>
</html>
