<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
<title>还这些没吃呢</title>
<style>
:root {
    --bg: #F2F2F7;
    --card-bg: #FFFFFF;
    --primary: #007AFF;
    --danger: #FF3B30;
    --text: #000000;
    --gray: #8E8E93;
}

* { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }

body {
    margin: 0;
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
    background: var(--bg);
    color: var(--text);
    /* 关键：使用动态视口高度，防止地址栏/键盘干扰 */
    height: 100dvh; 
    overflow: hidden;
    display: flex;
    flex-direction: column;
}

/* 顶部标题 */
header {
    padding: 20px;
    text-align: center;
    font-size: 20px;
    font-weight: 700;
    background: rgba(255,255,255,0.8);
    backdrop-filter: blur(10px);
    z-index: 10;
    flex-shrink: 0;
}

/* 列表区域 */
#list-container {
    flex: 1;
    overflow-y: auto;
    padding: 15px;
    padding-bottom: 100px;
    -webkit-overflow-scrolling: touch;
}

.swipe-item {
    position: relative;
    margin-bottom: 12px;
    border-radius: 16px;
    overflow: hidden;
    background: transparent;
}

.delete-action {
    position: absolute;
    right: 0;
    top: 0;
    bottom: 0;
    width: 80px;
    background: var(--danger);
    color: white;
    display: flex;
    align-items: center;
    justify-content: center;
    font-weight: 600;
    z-index: 1;
}

.card {
    position: relative;
    background: var(--card-bg);
    padding: 16px;
    border-radius: 16px;
    display: flex;
    justify-content: space-between;
    align-items: center;
    z-index: 2;
    transition: transform 0.3s cubic-bezier(0.25, 0.8, 0.25, 1);
    height: 70px; /* 固定高度以配合 Badge 90% */
    box-shadow: 0 2px 8px rgba(0,0,0,0.04);
}

.card-info { flex: 1; }
.card-title { font-size: 17px; font-weight: 600; margin-bottom: 4px; }
.card-date { font-size: 13px; color: var(--gray); }

/* Badge 样式优化 */
.badge {
    font-size: 58px;
    font-weight: 700;
    height: 90%;
    line-height: 1;
    min-width: 60px;
    display: flex;
    align-items: center;
    justify-content: center;
    margin-left: 12px;
    background: transparent !important;
    border-radius: 0;
}
.badge-expired { color: #8E8E93; }
.badge-urgent { color: #FF3B30; }
.badge-warning { color: #FF9500; }
.badge-safe { color: #34C759; }

/* 状态背景色 */
.status-expired { background: #f2f2f7; }
.status-urgent { background: #ffe5e5; }
.status-warning { background: #fff4cc; }
.status-safe { background: #e8f9ec; }

/* 浮动按钮 */
.fab {
    position: fixed;
    right: 25px;
    bottom: 30px;
    width: 60px;
    height: 60px;
    border-radius: 50%;
    background: rgba(255,255,255,0.9);
    backdrop-filter: blur(10px);
    color: var(--primary);
    font-size: 36px;
    display: flex;
    align-items: center;
    justify-content: center;
    box-shadow: 0 4px 15px rgba(0,0,0,0.15);
    z-index: 90;
    border: none;
    cursor: pointer;
}
.fab:active { transform: scale(0.95); }

/* 弹窗遮罩 */
.modal-overlay {
    position: fixed;
    inset: 0;
    background: rgba(0,0,0,0.4);
    backdrop-filter: blur(5px);
    z-index: 1000;
    display: none;
    opacity: 0;
    transition: opacity 0.3s;
}
.modal-overlay.active { display: flex; opacity: 1; }

/* 弹窗内容 */
.modal-panel {
    position: fixed;
    left: 0;
    right: 0;
    bottom: 0;
    background: var(--card-bg);
    border-radius: 22px 22px 0 0;
    padding: 24px 20px 40px;
    z-index: 1001;
    transform: translateY(100%);
    transition: transform 0.3s cubic-bezier(0.25, 0.8, 0.25, 1);
    max-height: 90vh;
    display: flex;
    flex-direction: column;
    /* 关键：允许内部滚动，防止键盘遮挡 */
    overflow-y: auto; 
    -webkit-overflow-scrolling: touch;
}
.modal-panel.active { transform: translateY(0); }

.modal-handle {
    width: 40px;
    height: 5px;
    background: #d1d1d6;
    border-radius: 3px;
    margin: 0 auto 20px;
    flex-shrink: 0;
}

.modal-title {
    text-align: center;
    font-size: 18px;
    font-weight: 600;
    margin-bottom: 24px;
    flex-shrink: 0;
}

/* 表单行 */
.input-row {
    display: flex;
    gap: 12px;
    background: #F2F2F7;
    padding: 6px;
    border-radius: 14px;
    margin-bottom: 24px;
    align-items: center;
    flex-shrink: 0;
}

.input-row input[type="text"] {
    flex: 1;
    border: none;
    background: transparent;
    padding: 12px;
    font-size: 16px; /* 防止 iOS 缩放 */
    outline: none;
    color: var(--text);
}

.calendar-btn {
    width: 48px;
    height: 44px;
    background: white;
    border-radius: 10px;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 22px;
    position: relative;
    box-shadow: 0 2px 5px rgba(0,0,0,0.05);
    flex-shrink: 0;
}
.calendar-btn input[type="date"] {
    position: absolute;
    inset: 0;
    opacity: 0;
    width: 100%;
    height: 100%;
    cursor: pointer;
}

.save-btn {
    width: 100%;
    padding: 16px;
    background: var(--primary);
    color: white;
    border: none;
    border-radius: 14px;
    font-size: 17px;
    font-weight: 600;
    cursor: pointer;
    flex-shrink: 0;
}
.save-btn:active { opacity: 0.8; }

.empty-state {
    text-align: center;
    color: var(--gray);
    margin-top: 60px;
    font-size: 15px;
}
</style>
</head>
<body>

<header>还这些没吃呢</header>

<div id="list-container">
    <div id="food-list"></div>
    <div id="empty-state" class="empty-state" style="display:none;">
        暂无记录<br>
    </div>
</div>

<button class="fab" onclick="openModal()">+</button>

<!-- 弹窗 -->
<div class="modal-overlay" id="modal-overlay" onclick="handleOverlayClick(event)"></div>
<div class="modal-panel" id="modal-panel">
    <div class="modal-handle"></div>
    <div class="modal-title">又得到什么好吃的啦？</div>
    
    <div class="input-row">
        <input type="text" id="input-name" placeholder="放这里！" autocomplete="off">
        <div class="calendar-btn">
            📅
            <input type="date" id="input-date">
        </div>
    </div>

    <button class="save-btn" onclick="saveItem()">GET <!--  -->!</button>
</div>

<script>
// --- 数据逻辑 ---
let items = JSON.parse(localStorage.getItem('foods') || '[]');

function render() {
    const list = document.getElementById('food-list');
    const empty = document.getElementById('empty-state');
    list.innerHTML = '';

    if (items.length === 0) {
        empty.style.display = 'block';
        return;
    }
    empty.style.display = 'none';

    // 排序
    items.sort((a, b) => new Date(a.date) - new Date(b.date));

    items.forEach(item => {
        const days = getDays(item.date);
        let statusClass = 'status-safe', badgeClass = 'badge-safe', text = `${days}`;
        
        if (days < 0) { statusClass = 'status-expired'; badgeClass = 'badge-expired'; text = `坏掉啦！`; }
        else if (days <= 3) { statusClass = 'status-urgent'; badgeClass = 'badge-urgent'; text = days===0?'今天':`${days}`; }
        else if (days <= 7) { statusClass = 'status-warning'; badgeClass = 'badge-warning'; }

        const wrapper = document.createElement('div');
        wrapper.className = 'swipe-item';
        wrapper.innerHTML = `
            <div class="delete-action" onclick="confirmDelete(${item.id})">已吃</div>
            <div class="card ${statusClass}" id="card-${item.id}">
                <div class="card-info">
                    <div class="card-title">${item.name}</div>
                    <div class="card-date">${item.date}</div>
                </div>
                <div class="badge ${badgeClass}">${text}</div>
            </div>
        `;
        list.appendChild(wrapper);
        initSwipe(wrapper.querySelector('.card'));
    });
}

function getDays(dateStr) {
    const today = new Date(); today.setHours(0,0,0,0);
    const target = new Date(dateStr); target.setHours(0,0,0,0);
    return Math.ceil((target - today) / (1000*60*60*24));
}

function saveData() {
    localStorage.setItem('foods', JSON.stringify(items));
    render();
}

// --- 交互逻辑 ---

// 滑动删除
function initSwipe(card) {
    let startX, currentX, isSwiping = false;
    const parent = card.parentElement;
    
    card.addEventListener('touchstart', e => {
        // 关闭其他打开的
        document.querySelectorAll('.card').forEach(c => {
            if(c !== card) c.style.transform = 'translateX(0)';
        });
        startX = e.touches[0].clientX;
        isSwiping = true;
        card.style.transition = 'none';
    }, {passive: true});

    card.addEventListener('touchmove', e => {
        if(!isSwiping) return;
        currentX = e.touches[0].clientX;
        const diff = currentX - startX;
        if(diff < 0 && diff > -80) {
            card.style.transform = `translateX(${diff}px)`;
        }
    }, {passive: true});

    card.addEventListener('touchend', () => {
        if(!isSwiping) return;
        isSwiping = false;
        const diff = currentX - startX;
        card.style.transition = 'transform 0.3s cubic-bezier(0.25, 0.8, 0.25, 1)';
        if(diff < -40) {
            card.style.transform = 'translateX(-80px)';
        } else {
            card.style.transform = 'translateX(0)';
        }
    });
    
    // 点击复位
    card.addEventListener('click', () => {
        if(card.style.transform.includes('-80')) {
            card.style.transform = 'translateX(0)';
        }
    });
}

function confirmDelete(id) {
    if(confirm('确定已经吃完了吗？')) {
        items = items.filter(i => i.id !== id);
        saveData();
    } else {
        // 取消则复位卡片
        const card = document.getElementById(`card-${id}`);
        if(card) card.style.transform = 'translateX(0)';
    }
}

// --- 弹窗与键盘处理 (核心修复部分) ---

const modalOverlay = document.getElementById('modal-overlay');
const modalPanel = document.getElementById('modal-panel');
const inputName = document.getElementById('input-name');
const inputDate = document.getElementById('input-date');

function openModal() {
    modalOverlay.classList.add('active');
    // 稍微延迟让动画生效后再聚焦
    setTimeout(() => {
        modalPanel.classList.add('active');
        inputName.focus();
        // 关键：聚焦后强制滚动到底部，确保输入框可见
        scrollToInput();
    }, 100);
}

function closeModal() {
    modalPanel.classList.remove('active');
    setTimeout(() => {
        modalOverlay.classList.remove('active');
        inputName.blur();
        inputDate.blur();
        inputName.value = '';
        inputDate.value = '';
    }, 300);
}

function handleOverlayClick(e) {
    if(e.target === modalOverlay) closeModal();
}

// 核心：当输入框聚焦时，确保弹窗滚动到合适位置
function scrollToInput() {
    // 简单粗暴但有效：将输入框滚动到可视区域中间
    // 使用 setTimeout 等待键盘弹起动画
    setTimeout(() => {
        inputName.scrollIntoView({ behavior: 'smooth', block: 'center' });
    }, 300);
    
    // 再次检查，防止某些安卓机慢半拍
    setTimeout(() => {
        inputName.scrollIntoView({ behavior: 'auto', block: 'center' });
    }, 600);
}

// 监听聚焦事件，确保每次聚焦都触发滚动
inputName.addEventListener('focus', scrollToInput);
inputDate.addEventListener('focus', scrollToInput);

// 保存物品
function saveItem() {
    const name = inputName.value.trim();
    const date = inputDate.value;
    
    if(!name || !date) {
        alert('请填写名称并选择日期');
        return;
    }
    
    items.push({ id: Date.now(), name, date });
    saveData();
    closeModal();
}

// 下拉关闭手势
let startY = 0;
modalPanel.addEventListener('touchstart', e => {
    startY = e.touches[0].clientY;
    modalPanel.style.transition = 'none';
}, {passive: true});

modalPanel.addEventListener('touchmove', e => {
    const y = e.touches[0].clientY;
    const diff = y - startY;
    if(diff > 0) {
        modalPanel.style.transform = `translateY(${diff}px)`;
    }
}, {passive: true});

modalPanel.addEventListener('touchend', e => {
    const y = e.changedTouches[0].clientY;
    const diff = y - startY;
    modalPanel.style.transition = 'transform 0.3s cubic-bezier(0.25, 0.8, 0.25, 1)';
    
    if(diff > 100) {
        closeModal();
    } else {
        modalPanel.style.transform = 'translateY(0)';
    }
});

// 初始化
render();
// 设置日期最小值为今天
document.getElementById('input-date').min = new Date().toISOString().split('T')[0];

</script>
<script>
// --- 数据逻辑 ---
let items = JSON.parse(localStorage.getItem('foods') || '[]');

function render() {
    const list = document.getElementById('food-list');
    const empty = document.getElementById('empty-state');
    list.innerHTML = '';

    if (items.length === 0) {

        return;

    empty.style.display = 'none';

    // 排序
    items.sort((a, b) => new Date(a.date) - new Date(b.date));

    items.forEach(item => {

        let statusClass = 'status-safe', badgeClass = 'badge-safe', text = `剩${days}天`;
        
        if (days < 0) { statusClass = 'status-expired'; badgeClass = 'badge-expired'; text = `过期${Math.abs(days)}天`; }
        else if (days <= 3) { statusClass = 'status-urgent'; badgeClass = 'badge-urgent'; text = days===0?'今天':`剩${days}天`; }
        else if (days <= 7) { statusClass = 'status-warning'; badgeClass = 'badge-warning'; }

        const wrapper = document.createElement('div');
        wrapper.className = 'swipe-item';
        wrapper.innerHTML = `
            <div class="delete-action" onclick="confirmDelete(${item.id})">已吃</div>
            <div class="card ${statusClass}" id="card-${item.id}">
                <div class="card-info">
                    <div class="card-title">${item.name}</div>
                    <div class="card-date">${item.date}</div>
                </div>
                <div class="badge ${badgeClass}">${text}</div>
            </div>
        `;
        list.appendChild(wrapper);
        initSwipe(wrapper.querySelector('.card'));
    });
}

function getDays(dateStr) {
    const today = new Date(); today.setHours(0,0,0,0);
    const target = new Date(dateStr); target.setHours(0,0,0,0);
    return Math.ceil((target - today) / (1000*60*60*24));
}

function saveData() {
    localStorage.setItem('foods', JSON.stringify(items));
    render();
}

// --- 交互逻辑 ---

// 滑动删除
function initSwipe(card) {
    let startX, currentX, isSwiping = false;
    
    card.addEventListener('touchstart', e => {
        // 关闭其他打开的
        document.querySelectorAll('.card').forEach(c => {
            if(c !== card) c.style.transform = 'translateX(0)';
        });
        startX = e.touches[0].clientX;
        isSwiping = true;
        card.style.transition = 'none';
    }, {passive: true});

    card.addEventListener('touchmove', e => {
        if(!isSwiping) return;
        currentX = e.touches[0].clientX;
        const diff = currentX - startX;
        if(diff < 0 && diff > -80) {
            card.style.transform = `translateX(${diff}px)`;
        }
    }, {passive: true});

    card.addEventListener('touchend', () => {
        if(!isSwiping) return;
        isSwiping = false;
        const diff = currentX - startX;
        card.style.transition = 'transform 0.3s cubic-bezier(0.25, 0.8, 0.25, 1)';
        if(diff < -40) {
            card.style.transform = 'translateX(-80px)';
        } else {
            card.style.transform = 'translateX(0)';
        }
    });
    
    // 点击复位
    card.addEventListener('click', () => {
        if(card.style.transform && card.style.transform.includes('-80')) {
            card.style.transform = 'translateX(0)';
        }
    });
}

function confirmDelete(id) {
    if(confirm('确定已经吃完了吗？')) {
        items = items.filter(i => i.id !== id);
        saveData();
    } else {
        // 取消则复位卡片
        const card = document.getElementById(`card-${id}`);
        if(card) card.style.transform = 'translateX(0)';
    }
}

// --- 弹窗与键盘处理 ---

const modalOverlay = document.getElementById('modal-overlay');
const modalPanel = document.getElementById('modal-panel');
const inputName = document.getElementById('input-name');
const inputDate = document.getElementById('input-date');

function openModal() {
    modalOverlay.classList.add('active');
    setTimeout(() => {
        modalPanel.classList.add('active');
        inputName.focus();
        scrollToInput();
    }, 100);
}

function closeModal() {
    modalPanel.classList.remove('active');
    setTimeout(() => {
        modalOverlay.classList.remove('active');
        inputName.blur();
        inputDate.blur();
        inputName.value = '';
        inputDate.value = '';
        // 重置 transform 以防万一
        modalPanel.style.transform = ''; 
    }, 300);
}

function handleOverlayClick(e) {
    if(e.target === modalOverlay) closeModal();
}

function scrollToInput() {
    setTimeout(() => {
        inputName.scrollIntoView({ behavior: 'smooth', block: 'center' });
    }, 300);
    setTimeout(() => {
        inputName.scrollIntoView({ behavior: 'auto', block: 'center' });
    }, 600);
}

inputName.addEventListener('focus', scrollToInput);
inputDate.addEventListener('focus', scrollToInput);

function saveItem() {
    const name = inputName.value.trim();
    const date = inputDate.value;
    
    if(!name || !date) {
        alert('请填写名称并选择日期');
        return;
    }
    
    items.push({ id: Date.now(), name, date });
    saveData();
    closeModal();
}

// --- 修复：下拉关闭手势逻辑 (重新绑定) ---
let panelStartY = 0;

modalPanel.addEventListener('touchstart', e => {
    // 如果正在输入，先不处理下拉，或者可以选择先 blur
    // 这里为了兼容，只要滑动距离够大就关闭
    panelStartY = e.touches[0].clientY;
    modalPanel.style.transition = 'none';
}, {passive: true});

modalPanel.addEventListener('touchmove', e => {
    const y = e.touches[0].clientY;
    const diff = y - panelStartY;
    // 只有向下滑动才处理
    if(diff > 0) {
        modalPanel.style.transform = `translateY(${diff}px)`;
    }
}, {passive: true});

modalPanel.addEventListener('touchend', e => {
    const y = e.changedTouches[0].clientY;
    const diff = y - panelStartY;
    
    modalPanel.style.transition = 'transform 0.3s cubic-bezier(0.25, 0.8, 0.25, 1)';
    
    // 滑动超过 100px 或者 速度很快 则关闭

        // 否则弹回原位

    }

// 初始化

document.getElementById('input-date').min = new Date().toISOString().split('T')[0];
</script>
