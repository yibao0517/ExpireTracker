<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>保质期管家</title>

<style>
body{
    margin:0;
    font-family:-apple-system;
    background:#f2f2f7;
}

header{
    padding:20px;
    font-size:24px;
    font-weight:bold;
    text-align:center;
    background:white;
}

#list{
    padding:15px;
    padding-bottom:100px;
}

.swipe-container{
    position:relative;
    overflow:hidden;
    margin-bottom:12px;
    border-radius:16px;
}

.card{
    padding:15px;
    border-radius:16px;
    transition:transform 0.25s ease;
    background:white;
}

/* 整条颜色 */
.e-urgent{ background:#ffe5e5; }
.e-warning{ background:#fff4cc; }
.e-safe{ background:#e8f9ec; }

.delete-btn{
    position:absolute;
    right:0;
    top:0;
    bottom:0;
    width:90px;
    background:#ff3b30;
    color:white;
    display:flex;
    align-items:center;
    justify-content:center;
    font-weight:bold;
}

.days{
    font-size:18px;
    font-weight:bold;
    margin-top:5px;
}

.fab{
    position:fixed;
    bottom:25px;
    right:25px;
    width:60px;
    height:60px;
    border-radius:50%;
    background:#007aff;
    color:white;
    font-size:32px;
    display:flex;
    align-items:center;
    justify-content:center;
    box-shadow:0 5px 15px rgba(0,0,0,0.2);
}

.modal{
    position:fixed;
    bottom:0;
    left:0;
    right:0;
    background:white;
    padding:20px;
    border-top-left-radius:20px;
    border-top-right-radius:20px;
    display:none;
}

input{
    width:100%;
    padding:10px;
    margin-bottom:12px;
    border-radius:8px;
    border:1px solid #ddd;
}
</style>
</head>

<body onclick="closeAll()">

<header>保质期管家</header>

<div id="list"></div>

<div class="fab" onclick="event.stopPropagation(); openModal()">+</div>

<div class="modal" id="modal">
    <h3>新增物品</h3>
    <input id="name" placeholder="物品名称">
    <input type="date" id="expireDate">
    <button onclick="addItem()">保存</button>
</div>

<script>
let items = JSON.parse(localStorage.getItem("items") || "[]");
let openedItemId = null; // 当前打开的条目

function save() {
    localStorage.setItem("items", JSON.stringify(items));
}

function daysLeft(dateStr) {
    const today = new Date();
    const target = new Date(dateStr);
    return Math.ceil((target - today) / (1000 * 60 * 60 * 24));
}

function getColor(days) {
    if (days <= 3) return "#ff4d4d";
    if (days <= 7) return "#ffd633";
    return "#4CAF50";
}

function render() {
    const list = document.getElementById("list");
    list.innerHTML = "";

    items.sort((a,b)=> new Date(a.date)-new Date(b.date));

    items.forEach(item => {
        const days = daysLeft(item.date);

        const wrapper = document.createElement("div");
        wrapper.className = "swipe-wrapper";

        const swipeItem = document.createElement("div");
        swipeItem.className = "swipe-item";
        swipeItem.style.background = getColor(days);

        swipeItem.innerHTML = `
            <div>
                <div style="font-weight:bold;font-size:18px;">${item.name}</div>
                <div>到期：${item.date}</div>
                <div style="font-weight:bold;">还有 ${days} 天</div>
            </div>
        `;

        const action = document.createElement("div");
        action.className = "swipe-action";
        action.innerText = "已吃";

        action.onclick = (e) => {
            e.stopPropagation();
            if(confirm("确认已吃？")){
                items = items.filter(i => i.id !== item.id);
                save();
                render();
            }
        };

        wrapper.appendChild(swipeItem);
        wrapper.appendChild(action);

        // 滑动逻辑
        let startX = 0;
        let currentX = 0;

        swipeItem.addEventListener("touchstart", e => {
            startX = e.touches[0].clientX;

            // 自动关闭其他已展开
            document.querySelectorAll(".swipe-item").forEach(el=>{
                if(el !== swipeItem){
                    el.style.transform = "translateX(0)";
                }
            });

            openedItemId = null;
        });

        swipeItem.addEventListener("touchmove", e => {
            currentX = e.touches[0].clientX;
            let diff = currentX - startX;

            if(diff < 0){
                swipeItem.style.transform = `translateX(${diff}px)`;
            }
        });

        swipeItem.addEventListener("touchend", e => {
            let diff = currentX - startX;

            if(diff < -80){
                swipeItem.style.transform = "translateX(-100px)";
                openedItemId = item.id;
            } else {
                swipeItem.style.transform = "translateX(0)";
                openedItemId = null;
            }
        });

        list.appendChild(wrapper);
    });
}

function addItem(){
    const name = document.getElementById("name").value;
    const date = document.getElementById("date").value;

    if(!name || !date) return;

    items.push({
        id: Date.now(),
        name,
        date
    });

    save();
    render();

    document.getElementById("name").value = "";
}

render();
</script>

</body>
</html>
