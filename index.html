<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>保质期管家</title>

<style>
body{
    margin:0;
    font-family:-apple-system;
    background:#f2f2f7;
}

header{
    padding:20px;
    font-size:24px;
    font-weight:bold;
    text-align:center;
    background:white;
}

#list{
    padding:15px;
    padding-bottom:100px;
}

.swipe-container{
    position:relative;
    overflow:hidden;
    margin-bottom:12px;
}

.card{
    background:white;
    padding:15px;
    border-radius:16px;
    box-shadow:0 2px 6px rgba(0,0,0,0.05);
    transition:transform 0.3s ease;
}

.e-urgent{
    border-left:6px solid #ff3b30;
}

.e-warning{
    border-left:6px solid #ffcc00;
}

.e-safe{
    border-left:6px solid #34c759;
}

.delete-btn{
    position:absolute;
    right:0;
    top:0;
    bottom:0;
    width:90px;
    background:#ff3b30;
    color:white;
    display:flex;
    align-items:center;
    justify-content:center;
    font-weight:bold;
    border-radius:16px;
}

.days{
    font-size:18px;
    font-weight:bold;
    margin-top:5px;
}

.fab{
    position:fixed;
    bottom:25px;
    right:25px;
    width:60px;
    height:60px;
    border-radius:50%;
    background:#007aff;
    color:white;
    font-size:32px;
    display:flex;
    align-items:center;
    justify-content:center;
    box-shadow:0 5px 15px rgba(0,0,0,0.2);
}

.modal{
    position:fixed;
    bottom:0;
    left:0;
    right:0;
    background:white;
    padding:20px;
    border-top-left-radius:20px;
    border-top-right-radius:20px;
    display:none;
}

input{
    width:100%;
    padding:10px;
    margin-bottom:12px;
    border-radius:8px;
    border:1px solid #ddd;
}
</style>
</head>

<body>

<header>保质期管家</header>

<div id="list"></div>

<div class="fab" onclick="openModal()">+</div>

<div class="modal" id="modal">
    <h3>新增物品</h3>
    <input id="name" placeholder="物品名称">
    <input type="date" id="expireDate">
    <button onclick="addItem()">保存</button>
</div>

<script>

let items = JSON.parse(localStorage.getItem("items")) || [];

function save(){
    localStorage.setItem("items", JSON.stringify(items));
}

function render(){
    const list=document.getElementById("list");
    list.innerHTML="";
    const today=new Date();

    items.sort((a,b)=>new Date(a.expireDate)-new Date(b.expireDate));

    items.forEach((item,index)=>{
        const expire=new Date(item.expireDate);
        const diff=Math.ceil((expire-today)/(1000*60*60*24));

        let className="card";

        if(diff<=3){
            className+=" e-urgent";
        }else if(diff<=7){
            className+=" e-warning";
        }else{
            className+=" e-safe";
        }

        list.innerHTML+=`
        <div class="swipe-container">
            <div class="delete-btn" onclick="confirmEat(${index})">已吃</div>
            <div class="${className}" 
                ontouchstart="startSwipe(event,this)" 
                ontouchmove="moveSwipe(event,this)" 
                ontouchend="endSwipe(event,this)">
                <div><b>${item.name}</b></div>
                <div>到期：${item.expireDate}</div>
                <div class="days">
                    ${diff<0?"已过期 "+Math.abs(diff)+" 天":"还有 "+diff+" 天"}
                </div>
            </div>
        </div>
        `;
    });
}

let startX=0;

function startSwipe(e,el){
    startX=e.touches[0].clientX;
}

function moveSwipe(e,el){
    let diff=e.touches[0].clientX-startX;
    if(diff<0 && diff>-100){
        el.style.transform=`translateX(${diff}px)`;
    }
}

function endSwipe(e,el){
    let diff=e.changedTouches[0].clientX-startX;
    if(diff<-50){
        el.style.transform="translateX(-90px)";
    }else{
        el.style.transform="translateX(0)";
    }
}

function confirmEat(index){
    if(confirm("确认已吃？")){
        items.splice(index,1);
        save();
        render();
    }
}

function addItem(){
    const name=document.getElementById("name").value;
    const expireDate=document.getElementById("expireDate").value;

    if(!name||!expireDate){
        alert("请填写完整");
        return;
    }

    items.push({name,expireDate});
    save();
    closeModal();
    render();
}

function openModal(){
    document.getElementById("modal").style.display="block";
}

function closeModal(){
    document.getElementById("modal").style.display="none";
    document.getElementById("name").value="";
}

render();

</script>

</body>
</html>
