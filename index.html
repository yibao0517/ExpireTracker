<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>保质期管家</title>

<style>
body{
    margin:0;
    font-family:-apple-system;
    background:#f2f2f7;
}

header{
    padding:20px;
    font-size:24px;
    font-weight:bold;
    text-align:center;
    background:white;
}

#list{
    padding:15px;
    padding-bottom:100px;
}

.swipe-container{
    position:relative;
    overflow:hidden;
    margin-bottom:12px;
    border-radius:16px;
}

/* 删除按钮在底层 */
.delete-btn{
    position:absolute;
    right:0;
    top:0;
    bottom:0;
    width:90px;
    background:#ff3b30;
    color:white;
    display:flex;
    align-items:center;
    justify-content:center;
    font-weight:bold;
    z-index:1;
}

/* 卡片在上层 */
.card{
    padding:15px;
    border-radius:16px;
    transition:transform 0.25s ease;
    position:relative;
    z-index:2;
}

/* 整条背景色 */
.e-urgent{ background:#ffe5e5; }
.e-warning{ background:#fff4cc; }
.e-safe{ background:#e8f9ec; }

.days{
    font-size:18px;
    font-weight:bold;
    margin-top:5px;
}

.fab{
    position:fixed;
    bottom:25px;
    right:25px;
    width:60px;
    height:60px;
    border-radius:50%;
    background:#007aff;
    color:white;
    font-size:32px;
    display:flex;
    align-items:center;
    justify-content:center;
    box-shadow:0 5px 15px rgba(0,0,0,0.2);
}

.modal{
    position:fixed;
    bottom:0;
    left:0;
    right:0;
    background:white;
    padding:20px;
    border-top-left-radius:20px;
    border-top-right-radius:20px;
    display:none;
}

input{
    width:100%;
    padding:10px;
    margin-bottom:12px;
    border-radius:8px;
    border:1px solid #ddd;
}
</style>
</head>

<body>

<header>保质期管家</header>

<div id="list"></div>

<div class="fab" onclick="openModal()">+</div>

<div class="modal" id="modal">
    <h3>新增物品</h3>
    <input id="name" placeholder="物品名称">
    <input type="date" id="expireDate">
    <button onclick="addItem()">保存</button>
</div>

<script>

let items = JSON.parse(localStorage.getItem("items") || "[]");
let activeCard = null;

function save(){
    localStorage.setItem("items", JSON.stringify(items));
}

function daysLeft(dateStr){
    const today = new Date();
    const target = new Date(dateStr);
    today.setHours(0,0,0,0);
    target.setHours(0,0,0,0);
    return Math.ceil((target - today)/(1000*60*60*24));
}

function render(){
    const list=document.getElementById("list");
    list.innerHTML="";

    items.sort((a,b)=> new Date(a.expireDate)-new Date(b.expireDate));

    items.forEach(item=>{
        const days = daysLeft(item.expireDate);

        const container=document.createElement("div");
        container.className="swipe-container";

        const btn=document.createElement("div");
        btn.className="delete-btn";
        btn.innerText="已吃";
        btn.onclick=(e)=>{
            e.stopPropagation();
            if(confirm("确认已吃？")){
                items=items.filter(i=>i.id!==item.id);
                save();
                render();
            }
        };

        const card=document.createElement("div");
        card.className="card";

        if(days<=3) card.classList.add("e-urgent");
        else if(days<=7) card.classList.add("e-warning");
        else card.classList.add("e-safe");

        card.innerHTML=`
            <div style="font-weight:bold;font-size:18px;">${item.name}</div>
            <div>到期：${item.expireDate}</div>
            <div class="days">
                ${days<0 ? "已过期 "+Math.abs(days)+" 天" : "还有 "+days+" 天"}
            </div>
        `;

        let startX=0;
        let currentX=0;

        card.addEventListener("touchstart",e=>{
            startX=e.touches[0].clientX;

            if(activeCard && activeCard!==card){
                activeCard.style.transform="translateX(0)";
            }
        });

        card.addEventListener("touchmove",e=>{
            currentX=e.touches[0].clientX;
            let diff=currentX-startX;

            if(diff<0 && diff>-90){
                card.style.transform=`translateX(${diff}px)`;
            }
        });

        card.addEventListener("touchend",()=>{
            let diff=currentX-startX;

            if(diff<-50){
                card.style.transform="translateX(-90px)";
                activeCard=card;
            }else{
                card.style.transform="translateX(0)";
                activeCard=null;
            }
        });

        container.appendChild(btn);
        container.appendChild(card);
        list.appendChild(container);
    });
}

function addItem(){
    const name=document.getElementById("name").value;
    const date=document.getElementById("expireDate").value;

    if(!name||!date) return;

    items.push({
        id:Date.now(),
        name:name,
        expireDate:date
    });

    save();
    render();

    document.getElementById("name").value="";
    document.getElementById("expireDate").value="";
    document.getElementById("modal").style.display="none";
}

function openModal(){
    document.getElementById("modal").style.display="block";
}

render();

</script>

</body>
</html>
